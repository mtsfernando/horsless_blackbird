services:
  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    container_name: horseless-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-horseless}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - horseless-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- FastAPI Backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: horseless-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/horseless}
      SECRET_KEY: ${SECRET_KEY}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY:-}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:5173"]}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - horseless-net

  # ---- React Frontend ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: horseless-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - horseless-net

  # ---- Python Scraper ----
  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: horseless-scraper
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/horseless}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - horseless-net

  # ---- NGINX Reverse Proxy ----
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: horseless-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - horseless-net

  # ---- Jenkins Automation ----
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: horseless-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    environment:
      JAVA_OPTS: "-Djava.awt.headless=true"
    networks:
      - horseless-net

volumes:
  postgres_data:
    driver: local
  jenkins_home:
    driver: local

networks:
  horseless-net:
    driver: bridge
