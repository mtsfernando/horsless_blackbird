services:
  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    container_name: horseless-db
    restart: unless-stopped
    mem_limit: 128m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-horseless}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - horseless-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- FastAPI Backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: horseless-backend
    restart: unless-stopped
    mem_limit: 256m
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-horseless}}
      SECRET_KEY: ${SECRET_KEY}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY:-}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:5173"]}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - horseless-net

  # ---- Python Scraper ----
  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: horseless-scraper
    restart: "no"
    mem_limit: 256m
    profiles:
      - scraper
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-horseless}}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - horseless-net

  # ---- NGINX Reverse Proxy & Frontend Static server ----
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: horseless-nginx
    restart: unless-stopped
    mem_limit: 64m
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - horseless-net

volumes:
  postgres_data:
    driver: local

networks:
  horseless-net:
    driver: bridge
