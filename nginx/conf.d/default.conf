# Upstream services
upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # ---- React Frontend (static files built into this image) ----
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ---- FastAPI Backend API ----
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (for scraper progress streaming)
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
    }

    # ---- Jenkins (Admin) ----
    location /blackbird/admin/jenkins/ {
        resolver 127.0.0.11 valid=30s;
        set $jenkins_upstream http://jenkins:8080;
        proxy_pass $jenkins_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /blackbird/admin/jenkins;

        # Jenkins WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Give Jenkins time to start up
        proxy_connect_timeout 10s;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;

        # Required for Jenkins redirects
        proxy_redirect http://jenkins:8080/ /blackbird/admin/jenkins/;
        proxy_redirect http://jenkins/ /blackbird/admin/jenkins/;
    }

    # ---- Health Check ----
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
